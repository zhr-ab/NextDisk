<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - NextDisk</title>
    <link rel="stylesheet" type="text/css" href="/static/content/bootstrap.min.css" />
    <link rel="stylesheet" type="text/css" href="/static/content/site.css" />
    <link rel="stylesheet" href="/static/content/signup.css">
    <script src="/static/scripts/signup.js"></script>
    <!-- 强制使用PNG作为favicon -->
    <link rel="shortcut icon" href="/static/content/icon.png?v=1" type="image/png">
    <link rel="icon" href="/static/content/icon.png?v=1" type="image/png">

    <!-- 为了兼容性，阻止浏览器寻找 .ico -->
    <link rel="icon" href="data:,">
</head>

<body>

    <div class="container body-content">
        {% block content %}{% endblock %}
        <hr />
        <footer>
            <p>&copy; {{ year }} - NextDisk</p>
        </footer>
    </div>

    {% block scripts %}{% endblock %}

</body>
</html>
